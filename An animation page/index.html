<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mountain Ground Scene</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="sky-overlay"></div>
  <div class="sky">
    <div class="sun" id="sun">
      <div class="rays" id="rays"></div>
    </div>
    <div class="cloud" id="cloud">
      <div class="rain" id="rain"></div>
    </div>
  </div>
  <div class="landscape">
    <div class="mountain mt-left"><span></span></div>
    <div class="mountain mt-right"><span></span></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
